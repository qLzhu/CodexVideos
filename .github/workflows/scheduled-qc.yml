name: Scheduled QC

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run QC
        run: python -m app.cli qc run --config configs/jobs/qc_project.yaml
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-scheduled-qc
          path: outputs/
